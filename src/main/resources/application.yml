server:
  port: 8000

spring:
  application:
    name: ddalgak
  datasource:
    url: jdbc:h2:mem:ddalgakdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
